name: Spectrum CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - name: Run pytest first time
        run: pytest -q > run1.txt
      - name: Run pytest second time
        run: pytest -q > run2.txt
      - name: Verify bit-identical outputs
        run: |
          diff run1.txt run2.txt
          echo "✅ Tests are deterministic - outputs identical"
